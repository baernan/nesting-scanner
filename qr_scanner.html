<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nesting Part Label Scanner</title>
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <!-- jsQR Library from CDN for browser-based scanning -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-panel: rgba(30, 41, 59, 0.7);
      --border-glow: rgba(59, 130, 246, 0.3);
      --accent: #3b82f6;
      --accent-glow: #60a5fa;
      --success: #10b981;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.3) 0px, transparent 50%),
        radial-gradient(at 50% 0%, rgba(15, 23, 42, 0.9) 0px, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      overflow-x: hidden;
    }

    header {
      width: 100%;
      max-width: 480px;
      text-align: center;
      margin-bottom: 0.5rem;
      padding: 0.25rem 0;
    }

    header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.15rem;
    }

    header p {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    main {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .scanner-container {
      position: relative;
      width: 240px;
      height: 180px;
      margin: 0 auto;
      flex-shrink: 0;
      background: #020617;
      border-radius: 1.25rem;
      overflow: hidden;
      border: 1px solid var(--border-glow);
      box-shadow: 0 8px 24px -8px rgba(0, 0, 0, 0.7), 0 0 15px rgba(59, 130, 246, 0.15);
      transition: height 0.3s ease;
    }

    #video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000000;
      z-index: 1;
    }

    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    .offscreen-scan-canvas {
      position: absolute;
      top: -9999px;
      left: -9999px;
      opacity: 0;
      pointer-events: none;
    }

    /* Target Reticle overlay */
    .reticle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      height: 60%;
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 1rem;
      pointer-events: none;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.55);
    }

    .reticle::before {
      content: '';
      position: absolute;
      top: -4px; left: -4px; right: -4px; bottom: -4px;
      border: 3px solid var(--accent);
      border-radius: 1.1rem;
      clip-path: polygon(
        0% 0%, 20% 0%, 20% 20%, 0% 20%, 0% 0%,
        80% 0%, 100% 0%, 100% 20%, 80% 20%, 80% 0%,
        80% 80%, 100% 80%, 100% 100%, 80% 100%, 80% 80%,
        0% 80%, 20% 80%, 20% 100%, 0% 100%, 0% 80%
      );
    }

    /* Scanning animation line */
    .scan-line {
      position: absolute;
      top: 20%;
      left: 20%;
      width: 60%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
      box-shadow: 0 0 8px var(--accent-glow);
      animation: scan 2s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% { top: 20%; }
      50% { top: 80%; }
      100% { top: 20%; }
    }

    /* Scanning info/error states overlay */
    .status-overlay {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      padding: 0.5rem 1rem;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0.8); opacity: 0.5; }
    }

    /* Scanned Info Panel */
    .card {
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-glow);
      border-radius: 1.25rem;
      padding: 0.75rem 1rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 0.75rem;
    }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent-glow);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .badge {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
      padding: 0.25rem 0.6rem;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .data-row {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .data-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 600;
    }

    .data-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .data-value.part-name {
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      color: #ffffff;
    }

    .dims-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.4rem 0.75rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* History Log */
    .history-container {
      background: var(--bg-panel);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 1.25rem;
      padding: 1.25rem;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .history-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .clear-btn {
      background: transparent;
      border: none;
      color: #ef4444;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      transition: background 0.2s;
    }

    .clear-btn:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.15);
      padding: 0.6rem 0.75rem;
      border-radius: 0.5rem;
      font-size: 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .history-item-info {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .history-item-name {
      font-weight: 600;
      color: var(--text-main);
    }

    .history-item-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .history-item-time {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: right;
    }

    /* Overlay Pause Button */
    .pause-btn-overlay {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      z-index: 10;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }

    .pause-btn-overlay:hover {
      background: rgba(15, 23, 42, 0.85);
      border-color: var(--accent-glow);
      transform: scale(1.05);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Camera choice select */
    .camera-select-container {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    select {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-main);
      padding: 0.5rem;
      border-radius: 0.5rem;
      font-size: 0.8rem;
      outline: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>Nesting Label Scanner</h1>
    <p>Shop-floor companion app for DXF Nester</p>
  </header>

  <main>
    <!-- Camera Viewport -->
    <div class="scanner-container" id="scannerContainer">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas" style="pointer-events: none; z-index: 2;"></canvas>
      <canvas id="scanCanvas" class="offscreen-scan-canvas"></canvas>
      <div class="reticle" style="z-index: 3;"></div>
      <div class="scan-line" style="z-index: 4;"></div>
      
      <!-- Pause overlay button in upper left -->
      <button class="pause-btn-overlay" id="toggleScanBtn" title="Pause Scanner">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
      </button>
      
      <div class="status-overlay" id="statusBox">
        <div class="pulse-dot"></div>
        <span id="statusText">Awaiting Camera Access...</span>
      </div>
    </div>

    <!-- Camera Source Selection -->
    <div class="camera-select-container" id="cameraSelectDiv" style="display: none;">
      <label class="data-label" for="cameraSelect">Video Source</label>
      <select id="cameraSelect"></select>
    </div>

    <!-- Scanned Part Card -->
    <div class="card" id="scanCard" style="opacity: 0.5; transform: scale(0.98);">
      <div class="card-header">
        <div class="card-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          Scanned Result
        </div>
        <span class="badge" id="scanBadge">Inactive</span>
      </div>

      <div class="data-row">
        <div class="data-label">Job / File Name</div>
        <div class="data-value" id="jobName" style="font-size: 1.1rem; font-weight: 600; color: var(--accent-glow);">---</div>
      </div>

      <div class="data-row">
        <div class="data-label">Part Name</div>
        <div class="data-value part-name" id="partName">---</div>
      </div>

      <div class="data-row">
        <div class="data-label">Sheet Association</div>
        <div class="data-value" id="sheetId" style="font-size: 1.1rem; font-weight: 600;">---</div>
      </div>

      <div class="dims-grid">
        <div class="data-row">
          <div class="data-label">Metric Dims</div>
          <div class="data-value" id="dimsMetric" style="font-size: 1.05rem; font-weight: 600; color: #60a5fa;">---</div>
        </div>
        <div class="data-row">
          <div class="data-label">Imperial Dims</div>
          <div class="data-value" id="dimsImperial" style="font-size: 1.05rem; font-weight: 600; color: #34d399;">---</div>
        </div>
      </div>
    </div>



    <!-- Scan History Log -->
    <div class="history-container">
      <div class="history-header">
        <span class="history-title">Recent Scans</span>
        <button class="clear-btn" id="clearHistoryBtn">Clear Log</button>
      </div>
      <div class="history-list" id="historyList">
        <!-- Scans appended dynamically -->
        <div class="history-item" style="justify-content: center; color: var(--text-muted); font-size: 0.75rem;">
          No parts scanned yet.
        </div>
      </div>
    </div>
  </main>

  <script>
    // Web Audio Synthesized success beep to avoid needing a wave/mp3 file asset
    function playBeep() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Short high-pitched beep
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 note
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
      } catch (e) {
        console.error("Audio Context playback failed", e);
      }
    }

    // Trigger mobile vibration if supported
    function triggerHaptic() {
      if (navigator.vibrate) {
        navigator.vibrate(80);
      }
    }

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('statusText');
    const statusBox = document.getElementById('statusBox');
    const toggleScanBtn = document.getElementById('toggleScanBtn');
    const cameraSelect = document.getElementById('cameraSelect');
    const cameraSelectDiv = document.getElementById('cameraSelectDiv');
    
    // UI elements for card
    const scanCard = document.getElementById('scanCard');
    const scanBadge = document.getElementById('scanBadge');
    const jobNameVal = document.getElementById('jobName');
    const partNameVal = document.getElementById('partName');
    const sheetIdVal = document.getElementById('sheetId');
    const dimsMetricVal = document.getElementById('dimsMetric');
    const dimsImperialVal = document.getElementById('dimsImperial');
    const historyList = document.getElementById('historyList');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');

    let stream = null;
    let isScanning = true;
    let lastScannedText = "";
    let lastScanTime = 0;
    let scanHistory = JSON.parse(localStorage.getItem('labelScanHistory') || '[]');
    let sizeAdjusted = false;

    // Retrieve DOM-bound scan canvas (important for iOS Safari buffer persistence)
    const scanCanvas = document.getElementById('scanCanvas');
    const scanCtx = scanCanvas.getContext('2d');

    // Render historical list
    function renderHistory() {
      historyList.innerHTML = '';
      if (scanHistory.length === 0) {
        historyList.innerHTML = `<div class="history-item" style="justify-content: center; color: var(--text-muted); font-size: 0.75rem;">No parts scanned yet.</div>`;
        return;
      }
      
      scanHistory.slice(0, 20).forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
          <div class="history-item-info">
            <span class="history-item-name">${item.part}</span>
            <span class="history-item-meta">Job: ${item.job || '---'} • Sheet: ${item.sheet} • ${[item.metric, item.imperial].filter(Boolean).join(' | ')}</span>
          </div>
          <span class="history-item-time">${item.time}</span>
        `;
        historyList.appendChild(div);
      });
    }

    clearHistoryBtn.onclick = () => {
      scanHistory = [];
      localStorage.setItem('labelScanHistory', '[]');
      renderHistory();
    };

    // Load initial history
    renderHistory();

    // Toggle camera scanning
    toggleScanBtn.onclick = () => {
      if (isScanning) {
        isScanning = false;
        toggleScanBtn.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        `;
        statusText.innerText = "Scanner Paused";
        statusBox.style.borderColor = "rgba(239, 68, 68, 0.4)";
      } else {
        isScanning = true;
        toggleScanBtn.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        `;
        statusText.innerText = "Scanning Active...";
        statusBox.style.borderColor = "var(--border-glow)";
        lastScannedText = ""; // Reset duplicate guard
      }
    };

    // Initialize camera stream
    async function startCamera(deviceId = null) {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }

      const constraints = {
        video: {
          deviceId: deviceId ? { exact: deviceId } : undefined,
          facingMode: deviceId ? undefined : { ideal: "environment" }
        }
      };

      try {
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        video.setAttribute('playsinline', true); // Critical for iOS Safari
        video.play();
        
        statusText.innerText = "Scanning Active...";
        statusBox.style.borderColor = "var(--border-glow)";
        
        // List camera devices
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');
        
        if (videoDevices.length > 1) {
          cameraSelect.innerHTML = '';
          videoDevices.forEach(device => {
            const opt = document.createElement('option');
            opt.value = device.deviceId;
            opt.text = device.label || `Camera ${cameraSelect.length + 1}`;
            if (deviceId && device.deviceId === deviceId) {
              opt.selected = true;
            } else if (!deviceId && device.label.toLowerCase().includes('back')) {
              opt.selected = true;
            }
            cameraSelect.appendChild(opt);
          });
          cameraSelectDiv.style.display = 'flex';
        }
        
        requestAnimationFrame(tick);
      } catch (err) {
        console.error("Camera access failed", err);
        statusText.innerText = "Camera Access Denied/Error";
        statusBox.style.borderColor = "#ef4444";
      }
    }

    cameraSelect.onchange = () => {
      sizeAdjusted = false;
      startCamera(cameraSelect.value);
    };

    // Helper to draw alignment overlay lines on successful scan
    function drawLine(begin, end, color) {
      ctx.beginPath();
      ctx.moveTo(begin.x, begin.y);
      ctx.lineTo(end.x, end.y);
      ctx.lineWidth = 4;
      ctx.strokeStyle = color;
      ctx.stroke();
    }

    function drawRect(location, color) {
      drawLine(location.topLeftCorner, location.topRightCorner, color);
      drawLine(location.topRightCorner, location.bottomRightCorner, color);
      drawLine(location.bottomRightCorner, location.bottomLeftCorner, color);
      drawLine(location.bottomLeftCorner, location.topLeftCorner, color);
    }

    function adjustScannerSize() {
      if (!video.videoWidth || !video.videoHeight) return;
      const container = document.getElementById('scannerContainer');
      const aspect = video.videoHeight / video.videoWidth; // height/width ratio
      
      // Calculate dynamic height for 240px wide layout
      const targetHeight = Math.round(240 * aspect);
      container.style.height = targetHeight + "px";
      
      // Scale resolution of overlay drawing canvas to match physical display box
      canvas.width = 240;
      canvas.height = targetHeight;
      sizeAdjusted = true;
    }

    // Main scan frame loop
    function tick() {
      try {
        if (video.readyState === video.HAVE_ENOUGH_DATA && isScanning) {
          if (!sizeAdjusted) {
            adjustScannerSize();
          }

          let scanWidth = video.videoWidth;
          let scanHeight = video.videoHeight;
          if (scanWidth <= 0 || scanHeight <= 0) {
            requestAnimationFrame(tick);
            return;
          }

          // Clear the visible green overlay box
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // Standardize downscaled dimensions for background CPU decoding
          const maxScanDim = 320;
          if (scanWidth > maxScanDim || scanHeight > maxScanDim) {
            const ratio = Math.min(maxScanDim / scanWidth, maxScanDim / scanHeight);
            scanWidth = Math.round(scanWidth * ratio);
            scanHeight = Math.round(scanHeight * ratio);
          }
          
          scanCanvas.width = scanWidth;
          scanCanvas.height = scanHeight;
          scanCtx.drawImage(video, 0, 0, scanCanvas.width, scanCanvas.height);
          
          const imageData = scanCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: "dontInvert",
          });

          if (code) {
            // Scale offscreen scan coordinates back to physical layout overlay canvas
            const scale = canvas.width / scanWidth;
            const mappedLoc = {
              topLeftCorner: { x: code.location.topLeftCorner.x * scale, y: code.location.topLeftCorner.y * scale },
              topRightCorner: { x: code.location.topRightCorner.x * scale, y: code.location.topRightCorner.y * scale },
              bottomRightCorner: { x: code.location.bottomRightCorner.x * scale, y: code.location.bottomRightCorner.y * scale },
              bottomLeftCorner: { x: code.location.bottomLeftCorner.x * scale, y: code.location.bottomLeftCorner.y * scale }
            };

            // Draw active tracking marker
            drawRect(mappedLoc, "#10b981");
            handleScanSuccess(code.data);
          }
        }
      } catch (err) {
        console.error("Scanner tick error:", err);
      }
      requestAnimationFrame(tick);
    }

    // Process a successfully decoded QR string
    function handleScanSuccess(rawText) {
      const now = Date.now();
      
      // Completely ignore duplicate scans of the currently displayed label
      if (rawText === lastScannedText) {
        return;
      }

      // Check format: Job: ... \n Part: ... \n Sheet: ... \n Dimensions: ...
      const lines = rawText.split('\n');
      let job = "Unknown Job";
      let part = "Unknown Part";
      let sheet = "Unknown Sheet";
      let metric = "---";
      let imperial = "---";
      let parsedCorrectly = false;

      lines.forEach(line => {
        if (line.startsWith("Job: ")) {
          job = line.replace("Job: ", "").trim();
        } else if (line.startsWith("Part: ")) {
          part = line.replace("Part: ", "").trim();
          parsedCorrectly = true;
        } else if (line.startsWith("Sheet: ")) {
          sheet = line.replace("Sheet: ", "").trim();
        } else if (line.startsWith("Dimensions: ") || line.startsWith("Dims: ") || line.startsWith("Dimensions: ")) {
          const dims = line.replace("Dimensions: ", "").replace("Dims: ", "").trim();
          const split = dims.split('|');
          if (split[0]) metric = split[0].trim();
          if (split[1]) imperial = split[1].trim();
        }
      });

      // Ignore non-nesting QR codes completely (keeps the current valid scan active on screen)
      if (!parsedCorrectly) {
        return;
      }

      lastScannedText = rawText;
      lastScanTime = now;

      // Feedback
      playBeep();
      triggerHaptic();

      // UI update
      scanBadge.innerText = "SUCCESS";
      scanBadge.style.color = "var(--success)";
      scanBadge.style.backgroundColor = "rgba(16, 185, 129, 0.15)";
      scanBadge.style.borderColor = "rgba(16, 185, 129, 0.3)";
      
      jobNameVal.innerText = job;
      partNameVal.innerText = part;
      sheetIdVal.innerText = sheet;
      dimsMetricVal.innerText = metric;
      dimsImperialVal.innerText = imperial;
      
      scanCard.style.opacity = "1";
      scanCard.style.transform = "scale(1)";
      scanCard.style.boxShadow = "0 10px 25px rgba(16, 185, 129, 0.15)";
      setTimeout(() => {
        scanCard.style.boxShadow = "0 4px 20px rgba(0, 0, 0, 0.3)";
      }, 1000);

      // Log to history (filtering out any previous duplicate so it moves to the top)
      const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      scanHistory = scanHistory.filter(item => 
        !(item.job === job && item.part === part && item.sheet === sheet)
      );
      
      scanHistory.unshift({
        job: job,
        part: part,
        sheet: sheet,
        metric: metric === "---" ? "" : metric,
        imperial: imperial === "---" ? "" : imperial,
        time: timeStr
      });
      
      localStorage.setItem('labelScanHistory', JSON.stringify(scanHistory));
      renderHistory();
    }

    // Start on page load
    window.addEventListener('load', () => startCamera());
  </script>
</body>
